version: 2
updates:
  # npm এর জন্য (Node.js)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10

  # Composer এর জন্য (PHP)
  - package-ecosystem: "composer"
    directory: "/"
    schedule:
      interval: "daily"

  # GitHub Actions এর জন্য
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
